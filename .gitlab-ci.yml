deploy-pages:
  image: alpine:3.21
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$SSH_DEPLOY_KEY" ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - mkdir -p public
    - cp index.html licenses.json public/
    - cd public
    - git init && git add -A
    - git -c user.email=gitlab-ci@malaa.tech -c "user.name=Malaa GitLab CI" commit -m "Deploy from GitLab"
    - git push --force git@github.com:Malaa-tech/licenses.github.io.git HEAD:main
  only:
    - main