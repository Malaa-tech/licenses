deploy-pages:
  image: alpine:3.21
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - cp "$SSH_DEPLOY_KEY" ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - git remote add github git@github.com:Malaa-tech/licenses.git 2>/dev/null || git remote set-url github git@github.com:Malaa-tech/licenses.git
    - git push --force github HEAD:main
  only:
    - main